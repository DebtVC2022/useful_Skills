version: "0.1.0"
framework: DemandSpec
language: zh-CN
created_at: "2026-06-11"

paths:
  demands_root: demands
  config_root: .demandspec
  templates: .demandspec/templates

naming:
  demand_id_format: "YYYYMMDD-slug"
  command_prefix: "/demandspec-"

required_stages:
  - 00_intake
  - 01_clarify
  - 02_diagnose
  - 03_model
  - 04_prototype
  - 05_spec
  - 06_validate
  - 07_handoff
  - 08_archive

ai_scenario_required_outputs:
  - 02_diagnose/ai-fit-assessment.md
  - 06_validate/acceptance-criteria.md
  - 07_handoff/algorithm-tasks.md

prototype_required_outputs:
  - 04_prototype/page-list.md
  - 04_prototype/figma-frame-spec.md
  - 04_prototype/component-tree.md
  - 04_prototype/interaction-map.md

quality_rules:
  mark_unknown_as: "待确认"
  mark_assumption_as: "当前假设"
  require_acceptance_for_prd: true
  require_ai_fit_for_ai_scenario: true
  require_prototype_spec_for_ui: true
