conferences:
  - key: cvpr
    name: IEEE/CVF Conference on Computer Vision and Pattern Recognition
    aliases: [CVPR]
    type: conference
    index_strategy: cvf
    year_indexes:
      2025: https://openaccess.thecvf.com/CVPR2025?day=all
      2026: https://openaccess.thecvf.com/CVPR2026?day=all
